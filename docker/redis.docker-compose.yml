services:
  redis:
    image: redis:7-alpine
    container_name: redis-auction
    restart: unless-stopped

    ports:
      - "6380:6379"

    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf

    volumes:
      - ./redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./users.acl:/usr/local/etc/redis/users.acl:ro
      - ./certs:/certs:ro